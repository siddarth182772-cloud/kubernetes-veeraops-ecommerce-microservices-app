name: CI/CD for Shopping Site (Frontend + Backend)

on:
  workflow_dispatch:

  push:
    branches:
      - main

env:
  AWS_REGION: us-west-2

  # Automatically uses selected region
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

  FRONTEND_SERVICES: "main appliances auto beauty books computers earphones electronics fashion food furniture googlegrocery googlemusic googlepay home mobiles sports toys two-wheelers"

  BACKEND_SERVICE: "backend"

permissions:
  contents: write

jobs:
  deploy:

    # Prevent workflow loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    runs-on: ubuntu-latest

    steps:

      # -------------------------
      # Checkout Repository
      # -------------------------
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}

      # -------------------------
      # Configure AWS Credentials
      # -------------------------
      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------
      # Login to ECR
      # -------------------------
      - name: 📦 Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # -------------------------
      # Verify AWS Region
      # -------------------------
      - name: 🌍 Verify AWS Region
        run: |
          echo "Using AWS Region: $AWS_REGION"
          aws sts get-caller-identity
          aws configure list

      # -------------------------
      # Build and Push Images
      # -------------------------
      - name: 🛠 Build and Push Docker Images
        run: |
          set -e

          IMAGE_TAG="${GITHUB_SHA}"

          echo "ECR Registry: $ECR_REGISTRY"

          # =====================================
          # FRONTEND SERVICES
          # =====================================

          for service in $FRONTEND_SERVICES; do

            FOLDER="frontend/$service"
            REPO_NAME="shopping-site-$service"
            IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

            if [ ! -f "$FOLDER/Dockerfile" ]; then
              echo "⚠️ No Dockerfile found in $FOLDER"
              continue
            fi

            echo "🚀 Building frontend service: $service"

            # Create ECR repository if not exists
            aws ecr describe-repositories \
              --repository-names $REPO_NAME \
              --region $AWS_REGION >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name $REPO_NAME \
              --image-scanning-configuration scanOnPush=true \
              --region $AWS_REGION

            # Build image
            docker build -t $IMAGE_URI $FOLDER

            # Push image
            docker push $IMAGE_URI

            echo "✅ Pushed: $IMAGE_URI"

            # Update Kubernetes deployment YAML
            if [ -f "$FOLDER/deployment.yml" ]; then
              sed -i "s|image:.*|image: $IMAGE_URI|g" "$FOLDER/deployment.yml"
            fi

          done

          # =====================================
          # BACKEND SERVICE
          # =====================================

          FOLDER="backend"
          REPO_NAME="shopping-site-backend"
          IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

          echo "🚀 Building backend service"

          # Create backend ECR repository if not exists
          aws ecr describe-repositories \
            --repository-names $REPO_NAME \
            --region $AWS_REGION >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name $REPO_NAME \
            --image-scanning-configuration scanOnPush=true \
            --region $AWS_REGION

          # Build backend image
          docker build -t $IMAGE_URI $FOLDER

          # Push backend image
          docker push $IMAGE_URI

          echo "✅ Pushed: $IMAGE_URI"

          # Update backend deployment YAML
          if [ -f "$FOLDER/backend-deployment.yml" ]; then
            sed -i "s|image:.*|image: $IMAGE_URI|g" "$FOLDER/backend-deployment.yml"
          fi

      # -------------------------
      # Commit Updated YAML Files
      # -------------------------
      - name: 🔄 Commit updated deployment YAML files
        run: |

          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git add frontend/**/deployment.yml
          git add backend/backend-deployment.yml

          git commit -m "🔄 Update image tags after build [skip ci]" || echo "No changes to commit"

          git push origin main || echo "Nothing to push"# name: CI/CD for Shopping Site (Frontend + Backend)


