apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-two-wheelers
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/siddarth182772-cloud/kubernetes-veeraops-ecommerce-microservices-app.git
    path: frontend/two-wheelers
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
