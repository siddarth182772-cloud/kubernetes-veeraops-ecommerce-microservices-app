apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-deployment
  labels:
    app: food
spec:
  replicas: 1
  selector:
    matchLabels:
      app: food
  template:
    metadata:
      labels:
        app: food
    spec:
      containers:
      - name: food
        image: 321652031342.dkr.ecr.us-west-2.amazonaws.com/shopping-site-food:72ffe23f272ceda6b0a6d5926b5aed0c4b649718
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: food-service
  labels:
    app: food
spec:
  type: ClusterIP
  selector:
    app: food
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
